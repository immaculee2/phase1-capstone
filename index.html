<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="indexPage.js" defer></script>
  <script type="module" src="favorites.js" defer></script>
</head>
<body class="bg-gray-100 font-sans text-black" >

  <!-- Navbar -->
  <nav class="bg-white shadow fixed  w-full">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex-shrink-0">
          <h1 class="text-2xl font-bold text-black">Book Explorer</h1>
        </div>
        <div class="hidden md:flex space-x-4">
          <a href="index.html" class="text-gray-700 hover:text-blue-600 font-semibold">Home</a>
          <a href="favorites.html" class="text-gray-700 hover:text-blue-600">Favorites</a>
          <a href="about.html" class="text-gray-700 hover:text-blue-600">About</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="bg-gray-300 text-white py-20">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <h2 class="text-4xl font-bold mb-4">Discover Your Next Favorite Book</h2>
      <p class="text-lg mb-6">Explore thousands of books from every genre and author.</p>
      <a href="#books" class="bg-white text-black/40 px-6 py-3 rounded-full font-semibold hover:bg-gray-100 transition">Browse Books</a>
    </div>
  </section>

  <!-- Book Grid & Search Section -->
  <section id="books" class="py-12">
    <div class="max-w-7xl mx-auto px-4">
      <h3 class="text-2xl font-bold mb-4 text-center">Browse Books</h3>

      <!-- Search Bar -->
      <div class="mb-6 flex space-x-2">
        <input type="text" id="search-input" placeholder="Search for books..."
               class="flex-1 border border-gray-300 rounded px-4 py-2 ">
        <button id="search-btn" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-slate-600">
          Search
        </button>
      </div>

      <!-- Book Grid -->
      <div id="books-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

      <!-- Loading / No results -->
      <p id="status-message" class="text-gray-600 mt-4"></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-500 hover:bg-gray-900 text-gray-200 py-6 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p>&copy; 2026 Book Explorer. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
